replicaCount: 2

image:
  repository: weather
  tag: latest
  pullPolicy: IfNotPresent

service:
  name: weather
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# OpenTelemetry Configuration
openTelemetry:
  enabled: true
  # Set to true to use OpenTelemetry Collector sidecar
  collectorSidecar:
    enabled: true
    image: otel/opentelemetry-collector-contrib:latest
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  # OpenTelemetry environment variables
  env:
    # Exporter configuration
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector.observability.svc.cluster.local:4317"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_TRACES_EXPORTER: "otlp"
    OTEL_METRICS_EXPORTER: "otlp"
    # Service configuration
    OTEL_SERVICE_NAME: "weather-service"
    OTEL_SDK_DISABLED: "false"
    # ElasticSearch credentials
    ELASTIC_USER: "elastic"
    ELASTIC_PASSWORD: "gBhlQzSwhumsDUdQ"

labels:
  app: weather
  release: stable

