apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "weather.fullname" . }}-otel-collector-config
  labels:
    app: {{ .Values.labels.app }}
    release: {{ .Values.labels.release }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    extensions:
      basicauth/client:
        client_auth:
          username: "admin"
          password: "Pass123@#word"

    exporters:
      # Requires 'otel/opentelemetry-collector-contrib' image
      prometheus:
        endpoint: "0.0.0.0:8889" # The port Prometheus will scrape from the collector
      
      # Jaeger now recommends using OTLP directly
      otlp/jaeger:
        endpoint: "jaeger-collector.observability.svc.cluster.local:4317" # Standard OTLP port for modern Jaeger
        tls:
          insecure: true

      opensearch:
        # REQUIRED: Main settings now live under 'http'
        http:
          endpoint: "https://opensearch-cluster-master.logging.svc.cluster.local:9200"
          auth:
            authenticator: basicauth/client
          tls:
            insecure_skip_verify: true
        logs_index: "otel-logs-custom"

      # Use 'debug' for basic logging (formerly 'logging' exporter)
      debug:
        verbosity: basic

    processors:
      batch:

    service:
      extensions: [basicauth/client]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger, opensearch]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [opensearch] # Replaced 'fluentd' with 'debug' for standard visibility
