apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "weather.fullname" . }}-otel-collector-config
  labels:
    app: {{ .Values.labels.app }}
    release: {{ .Values.labels.release }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    exporters:
      # Requires 'otel/opentelemetry-collector-contrib' image
      prometheus:
        endpoint: "0.0.0.0:8889" # The port Prometheus will scrape from the collector
      
      # Jaeger now recommends using OTLP directly
      otlp/jaeger:
        endpoint: "jaeger-collector.observability.svc.cluster.local:4317" # Standard OTLP port for modern Jaeger
        tls:
          insecure: true

      # Use 'debug' for basic logging (formerly 'logging' exporter)
      debug:
        verbosity: basic

    processors:
      batch:

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug] # Replaced 'fluentd' with 'debug' for standard visibility
