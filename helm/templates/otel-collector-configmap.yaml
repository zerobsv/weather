apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "weather.fullname" . }}-otel-collector-config
  labels:
    app: {{ .Values.labels.app }}
    release: {{ .Values.labels.release }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
      jaeger:
        endpoint: "jaeger:14250"
        tls:
          insecure: true
    processors:
      batch:
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
