apiVersion: v1
kind: Service
metadata:
  name: {{ include "weather.fullname" . }}
  labels:
    app: {{ .Values.labels.app }}
    release: {{ .Values.labels.release }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.labels.app }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
    - name: otel-prometheus
      port: 8889
      targetPort: 8889
